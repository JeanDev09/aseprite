name: Build Aseprite (Windows)

on:
  workflow_dispatch: # Te permite ejecutarlo manualmente desde la pestaña "Actions"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Aseprite
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # Importante: Aseprite necesita sus submódulos

      - name: Setup Ninja
        uses: ashutoshvarma/setup-ninja@master
        with:
          version: 1.10.2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Download Skia (Aseprite fork)
        run: |
          Invoke-WebRequest -Uri "https://github.com/aseprite/skia/releases/download/m102-861e4743af/Skia-Windows-Release-x64.zip" -OutFile skia.zip
          Expand-Archive -Path skia.zip -DestinationPath deps/skia
          
      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ^
                -DCMAKE_IGNORE_PATH="C:/ProgramData/chocolatey/bin;C:/vcpkg/bin" ^
                -DLAF_BACKEND=skia ^
                -DSKIA_DIR=%GITHUB_WORKSPACE%\deps\skia ^
                -DSKIA_LIBRARY_DIR=%GITHUB_WORKSPACE%\deps\skia\out\Release-x64 ^
                -DSKIA_LIBRARY=%GITHUB_WORKSPACE%\deps\skia\out\Release-x64\skia.lib ^
                -G Ninja ..

      - name: Build Aseprite
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          cd build
          ninja aseprite

      - name: Prepare Artifact
        run: |
          mkdir aseprite-build
          copy build\bin\aseprite.exe aseprite-build\
          copy build\bin\data aseprite-build\data -Recurse
          # Opcional: copia otras carpetas si son necesarias

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-Windows
          path: aseprite-build/
